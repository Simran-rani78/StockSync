version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      # Upgrade AWS CLI if needed
      - pip install --upgrade awscli

  pre_build:
    commands:
      - echo Logging into Amazon ECR...
      - aws --version
      # Authenticate Docker daemon to ECR Registry
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}

  build:
    commands:
      - echo Build started on `date`
      # 1. Build and Tag Backend Docker Image
      - echo Building the backend Docker image...
      - docker build -t $REPOSITORY_URI:latest ./backend
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
      
      # 2. Build Frontend Static Assets
      - echo Building the frontend React application...
      - cd frontend
      - npm install --legacy-peer-deps
      # Inject CloudFront-exposed API endpoint in Vite build
      - VITE_API_URL=$VITE_API_URL npm run build
      - cd ..

  post_build:
    commands:
      - echo Build completed on `date`
      
      # 1. Push Backend Image to ECR
      - echo Pushing the Docker image to Amazon ECR...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      
      # 2. Upload Frontend assets to AWS S3 Bucket
      - echo Uploading frontend assets to S3 bucket...
      - aws s3 sync frontend/dist/ s3://$FRONTEND_S3_BUCKET/ --delete
      
      # 3. Invalidate CloudFront CDN Cache
      - echo Invalidating CloudFront cache...
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"
      
      # 4. Generate imagedefinitions.json for ECS deploy phase
      - echo Writing ECS image definitions...
      - printf '[{"name":"stocksync-backend","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
