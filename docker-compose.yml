version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: stocksync-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stocksync_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stocksync-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=stocksync_db
      - DB_SSL=false
      - JWT_SECRET=supersecretjwtkeyforstocksyncsystem123!
      - JWT_EXPIRES_IN=7d
      # Fallbacks will trigger local upload. Override in real deployments.
      - AWS_ACCESS_KEY_ID=your_aws_access_key_id
      - AWS_SECRET_ACCESS_KEY=your_aws_secret_access_key
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET_NAME=stocksync-product-images-bucket
    depends_on:
      - db
    volumes:
      # Persist local uploads across container rebuilds
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: stocksync-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
